version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gacha-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Xc037417!
      MYSQL_DATABASE: gacha_system_prod
    volumes:
      - ./mysql/data:/var/lib/mysql
    networks:
      - gacha-net

  redis:
    image: redis:6
    container_name: gacha-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass Xc037417!
    volumes:
      - ./redis/data:/data
    networks:
      - gacha-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gacha-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: Xc037417!
    networks:
      - gacha-net

  gacha-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gacha-app
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - gacha-net

networks:
  gacha-net: