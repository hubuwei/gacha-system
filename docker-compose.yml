version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gacha-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Xc037417!
      MYSQL_DATABASE: gacha_system_prod
    volumes:
      - ./mysql/data:/var/lib/mysql
    networks:
      - gacha-net
    # 关键1：健康检查（确保MySQL完全就绪才让后端连）
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pXc037417!"]
      interval: 5s
      timeout: 5s
      retries: 30
    # 关键2：永不主动删除MySQL！
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:6
    container_name: gacha-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass Xc037417!
    volumes:
      - ./redis/data:/data
    networks:
      - gacha-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gacha-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: Xc037417!
    networks:
      - gacha-net

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: gacha-elasticsearch
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      - gacha-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  gacha-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gacha-app
    restart: always
    ports:
      - "8081:8081"
    # 关键3：只重启后端，不碰数据库！
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - gacha-net
    # 关键4：加载.env.prod环境变量（持久化配置）
    env_file:
      - .env.prod
    environment:
      # Elasticsearch配置（持久化到docker-compose，防止重启丢失）
      - ELASTICSEARCH_ENABLED=true
      - ES_URIS=http://gacha-elasticsearch:9200
      - ES_USERNAME=elastic
      - ES_PASSWORD=Xc037417!
      # 数据库配置
      - DB_HOST=gacha-mysql
      - DB_PORT=3306
      - DB_NAME=gacha_system_prod
      - DB_USERNAME=root
      - DB_PASSWORD=Xc037417!
      # Redis配置
      - REDIS_HOST=gacha-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=Xc037417!
      # RabbitMQ配置
      - RABBITMQ_HOST=gacha-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=Xc037417!

networks:
  gacha-net: