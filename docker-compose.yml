version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gacha-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Xc037417!
      MYSQL_DATABASE: gacha_system_prod
    volumes:
      - ./mysql/data:/var/lib/mysql
    networks:
      - gacha-net
    # 关键1：健康检查（确保MySQL完全就绪才让后端连）
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pXc037417!"]
      interval: 5s
      timeout: 5s
      retries: 30
    # 关键2：永不主动删除MySQL！
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:6
    container_name: gacha-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass Xc037417!
    volumes:
      - ./redis/data:/data
    networks:
      - gacha-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gacha-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: Xc037417!
    networks:
      - gacha-net

  elasticsearch:
    image: elasticsearch:7.17.0
    container_name: gacha-elasticsearch
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - ELASTIC_PASSWORD=Xc037417!
      - xpack.security.enabled=true
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
      - ./elasticsearch/plugins:/usr/share/elasticsearch/plugins
    networks:
      - gacha-net

  gacha-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gacha-app
    restart: always
    ports:
      - "8081:8081"
    # 关键3：只重启后端，不碰数据库！
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - gacha-net
    # 关键4：加载.env.prod环境变量（你之前没加！）
    env_file:
      - .env.prod

networks:
  gacha-net: