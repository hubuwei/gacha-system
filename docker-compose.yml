services:
  mysql:
    image: mysql:8.0
    container_name: gacha-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Xc037417!}
      MYSQL_DATABASE: ${DB_NAME:-gacha_system_prod}
    volumes:
      - ./mysql/data:/var/lib/mysql
    networks:
      - gacha-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-Xc037417!}"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:6
    container_name: gacha-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-Xc037417!}
    volumes:
      - ./redis/data:/data
    networks:
      - gacha-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gacha-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Xc037417!}
    networks:
      - gacha-net

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: gacha-elasticsearch
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      - gacha-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: gacha-auth-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - gacha-net
    env_file:
      - .env.prod
    environment:
      - APP_PORT=8084
      - DB_HOST=gacha-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-gacha_system_prod}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Xc037417!}
      - REDIS_HOST=gacha-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-Xc037417!}

  game-service:
    build:
      context: .
      dockerfile: Dockerfile.game
    container_name: gacha-game-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - gacha-net
    env_file:
      - .env.prod
    environment:
      - APP_PORT=8082
      - DB_HOST=gacha-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-gacha_system_prod}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Xc037417!}
      - REDIS_HOST=gacha-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-Xc037417!}
      - RABBITMQ_HOST=gacha-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-admin}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-Xc037417!}

  mall-service:
    build:
      context: .
      dockerfile: Dockerfile.mall
    container_name: gacha-mall-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - gacha-net
    env_file:
      - .env.prod
    environment:
      - APP_PORT=8081
      - ELASTICSEARCH_ENABLED=true
      - ES_URIS=http://gacha-elasticsearch:9200
      - ES_USERNAME=${ES_USERNAME:-}
      - ES_PASSWORD=${ES_PASSWORD:-}
      - DB_HOST=gacha-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-gacha_system_prod}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Xc037417!}
      - REDIS_HOST=gacha-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-Xc037417!}
      - RABBITMQ_HOST=gacha-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-admin}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-Xc037417!}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}

  cms-service:
    build:
      context: .
      dockerfile: Dockerfile.cms
    container_name: gacha-cms-service
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gacha-net
    env_file:
      - .env.prod
    environment:
      - APP_PORT=8085
      - DB_HOST=gacha-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-gacha_system_prod}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-Xc037417!}

  nginx:
    image: nginx:latest
    container_name: gacha-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx-dist:/usr/share/nginx/html
      - ./GamePapers:/usr/share/nginx/html/GamePapers
      - ./uploads:/usr/share/nginx/html/uploads
      - ./nginx-config.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-service
      - game-service
      - mall-service
      - cms-service
    networks:
      - gacha-net

networks:
  gacha-net:
    driver: bridge