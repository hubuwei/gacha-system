version: '3.8'

# ============================================
# 游戏商城系统 - Docker Compose 配置
# ============================================

services:
  # ==========================================
  # MySQL 数据库
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: gacha-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Xc037417!}
      MYSQL_DATABASE: ${DB_NAME:-gacha_system_prod}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/games_data.sql:/docker-entrypoint-initdb.d/02-games.sql
      - ./database/users_data.sql:/docker-entrypoint-initdb.d/03-users.sql
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis 缓存
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: gacha-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-Xc037417!} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # RabbitMQ 消息队列
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gacha-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Xc037417!}
    ports:
      - "5672:5672"   # AMQP端口
      - "15672:15672" # 管理界面
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Elasticsearch 搜索引擎
  # ==========================================
  elasticsearch:
    image: elasticsearch:7.17.29
    container_name: gacha-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Mall Service (商城服务)
  # ==========================================
  mall-service:
    build:
      context: .
      dockerfile: mall-service/Dockerfile
    container_name: gacha-mall-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-gacha_system_prod}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Xc037417!}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Xc037417!}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-Xc037417!}
      ES_URIS: http://elasticsearch:9200
      GAME_PAPERS_PATH: /opt/gacha-system/GamePapers
      MAIL_USERNAME: ${MAIL_USERNAME:-1712133303@qq.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-wkokvlcppuuaehhd}
    ports:
      - "8081:8081"
    volumes:
      - ./GamePapers:/opt/gacha-system/GamePapers:ro
      - mall-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Auth Service (认证服务)
  # ==========================================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: gacha-auth-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-gacha_system_prod}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Xc037417!}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Xc037417!}
      MAIL_USERNAME: ${MAIL_USERNAME:-1712133303@qq.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-wkokvlcppuuaehhd}
    ports:
      - "8084:8084"
    volumes:
      - auth-uploads:/app/uploads
      - auth-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Game Service (游戏服务)
  # ==========================================
  game-service:
    build:
      context: .
      dockerfile: game-service/Dockerfile
    container_name: gacha-game-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-gacha_system_prod}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Xc037417!}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Xc037417!}
    ports:
      - "8082:8082"
    volumes:
      - game-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Gacha Service (抽卡服务)
  # ==========================================
  gacha-service:
    build:
      context: .
      dockerfile: gacha-service/Dockerfile
    container_name: gacha-gacha-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-gacha_system_prod}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Xc037417!}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Xc037417!}
    ports:
      - "8083:8083"
    volumes:
      - gacha-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Frontend (React前端)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: game-mall/Dockerfile
    container_name: gacha-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - mall-service
      - auth-service
      - game-service
      - gacha-service
    networks:
      - gacha-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ==========================================
# 数据卷
# ==========================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  es-data:
    driver: local
  mall-logs:
    driver: local
  auth-logs:
    driver: local
  auth-uploads:
    driver: local
  game-logs:
    driver: local
  gacha-logs:
    driver: local

# ==========================================
# 网络
# ==========================================
networks:
  gacha-network:
    driver: bridge
