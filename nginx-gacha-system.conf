server {
    listen 80;
    server_name _;

    # 前端静态资源
    location / {
        root /opt/gacha-system;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # GamePapers 图片 - 直接访问路径
    location /GamePapers/ {
        alias /opt/gacha-system/GamePapers/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # GamePapers 图片 - API路径（后端静态资源映射）
    location /api/GamePapers/ {
        alias /opt/gacha-system/GamePapers/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 用户上传的头像 - Auth Service (8084)
    location /uploads/ {
        proxy_pass http://localhost:8084/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理 - Auth Service (8084) - 必须放在 /api/ 之前
    location /api/auth/ {
        proxy_pass http://localhost:8084/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API 反向代理 - Game Service (8082)
    location /api/game/ {
        proxy_pass http://localhost:8082/api/game/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API 反向代理 - Gacha Service (8083)
    location /api/gacha/ {
        proxy_pass http://localhost:8083/api/gacha/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API 反向代理 - Mall Service (8081) - 默认 API（放在最后）
    location /api/ {
        proxy_pass http://localhost:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    client_max_body_size 10M;
}