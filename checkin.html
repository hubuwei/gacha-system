<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日签到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .user-input {
            margin-bottom: 20px;
        }
        
        .user-input label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        
        .user-input input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .user-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            color: #666;
        }
        
        .status-value {
            color: #333;
            font-weight: bold;
        }
        
        .status-value.highlight {
            color: #667eea;
            font-size: 18px;
        }
        
        .checkin-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }
        
        .checkin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .checkin-btn:active {
            transform: translateY(0);
        }
        
        .checkin-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .query-btn {
            width: 100%;
            padding: 12px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .query-btn:hover {
            background: #e0e0e0;
        }
        
        .result-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .result-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .bonus-info {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-size: 14px;
            color: #856404;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 每日签到</h1>
        <p class="subtitle">连续签到赢大奖，第 30 天送手机！</p>
        
        <div class="user-input">
            <label for="userId">用户 ID</label>
            <input type="number" id="userId" placeholder="请输入用户 ID" value="1">
        </div>
        
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">今日状态</span>
                <span class="status-value" id="todayStatus">未查询</span>
            </div>
            <div class="status-item">
                <span class="status-label">连续签到天数</span>
                <span class="status-value highlight" id="consecutiveDays">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">最后签到日期</span>
                <span class="status-value" id="lastCheckInDate">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">下次奖励</span>
                <span class="status-value" id="nextBonus">-</span>
            </div>
        </div>
        
        <button class="checkin-btn" onclick="checkIn()" id="checkinBtn">立即签到</button>
        <button class="query-btn" onclick="queryStatus()">查询签到状态</button>
        
        <div class="loading" id="loading">加载中...</div>
        
        <div class="result-message" id="resultMessage"></div>
        
        <div class="bonus-info" id="bonusInfo" style="display: none;">
            <strong>🎁 奖励规则：</strong><br>
            • 每日签到：+10 积分 +1 元<br>
            • 连续 7 天：额外 +88 积分 +10 元<br>
            • 连续 30 天：额外 +888 积分 +100 元 + 手机兑换券
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8082/api/check-in';
        
        async function queryStatus() {
            const userId = document.getElementById('userId').value;
            if (!userId) {
                showMessage('请输入用户 ID', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(`${API_BASE}/status?userId=${userId}`);
                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    updateStatus(data.data);
                    showMessage('查询成功', 'success');
                } else {
                    showMessage(data.message || '查询失败', 'error');
                }
            } catch (error) {
                console.error('查询失败:', error);
                showMessage('网络错误：' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        async function checkIn() {
            const userId = document.getElementById('userId').value;
            if (!userId) {
                showMessage('请输入用户 ID', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ userId: parseInt(userId) })
                });
                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    const result = data.data;
                    
                    // 更新状态显示
                    updateStatus({
                        checkedInToday: result.success,
                        consecutiveDays: result.consecutiveDays,
                        lastCheckInDate: result.checkInDate,
                        nextBonusDays: result.nextBonusDays
                    });
                    
                    // 显示结果
                    let message = `${result.message}<br>`;
                    message += `获得：<strong>+${result.rewardPoints}积分</strong> <strong>+${result.rewardBalance}元</strong>`;
                    
                    if (result.bonusMessage) {
                        message += `<br><br><strong>${result.bonusMessage}</strong>`;
                    }
                    
                    showMessage(message, 'success');
                    
                    // 如果签到成功，禁用按钮直到明天
                    if (result.success) {
                        document.getElementById('checkinBtn').disabled = true;
                        document.getElementById('checkinBtn').textContent = '今日已签到';
                    }
                } else {
                    showMessage(data.message || '签到失败', 'error');
                }
            } catch (error) {
                console.error('签到失败:', error);
                showMessage('网络错误：' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        function updateStatus(status) {
            document.getElementById('todayStatus').textContent = status.checkedInToday ? '✅ 已签到' : '❌ 未签到';
            document.getElementById('todayStatus').style.color = status.checkedInToday ? '#28a745' : '#dc3545';
            
            document.getElementById('consecutiveDays').textContent = status.consecutiveDays || 0;
            
            if (status.lastCheckInDate) {
                document.getElementById('lastCheckInDate').textContent = status.lastCheckInDate;
            }
            
            if (status.nextBonusDays !== undefined) {
                if (status.nextBonusDays === 0) {
                    document.getElementById('nextBonus').textContent = '已达到目标！';
                    document.getElementById('nextBonus').style.color = '#28a745';
                } else {
                    document.getElementById('nextBonus').textContent = `还差${status.nextBonusDays}天`;
                    document.getElementById('nextBonus').style.color = '#667eea';
                }
            }
        }
        
        function showMessage(message, type) {
            const msgDiv = document.getElementById('resultMessage');
            msgDiv.innerHTML = message;
            msgDiv.className = `result-message ${type}`;
            msgDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    msgDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        // 页面加载时自动查询状态
        window.onload = function() {
            document.getElementById('bonusInfo').style.display = 'block';
        };
    </script>
</body>
</html>
