server:
  port: ${APP_PORT:8081}
  servlet:
    context-path: ${CONTEXT_PATH:/api}

spring:
  application:
    name: ${APP_NAME:mall-service}
  main:
    allow-bean-definition-overriding: true
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gacha_system_dev}?useUnicode=true&characterEncoding=${DB_ENCODING:utf-8}&useSSL=${DB_USE_SSL:false}&serverTimezone=${DB_TIMEZONE:Asia/Shanghai}&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: MallHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: ${JPA_DIALECT:org.hibernate.dialect.MySQL8Dialect}
        format_sql: ${JPA_FORMAT_SQL:true}
    open-in-view: false
  
  # Redis 配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:5000ms}
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms
    # 启用键空间通知（用于订单超时自动取消）
    keyspace-notifications-enabled: true
  
  # Elasticsearch 配置
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
    connection-timeout: ${ES_CONNECTION_TIMEOUT:5s}
    socket-timeout: ${ES_SOCKET_TIMEOUT:30s}
  
  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 5
        max-concurrency: 10
        prefetch: 10
  
  # Cache 配置 (使用简单缓存)
  cache:
    type: simple
  
  # 邮件配置
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:1712133303@qq.com}
    password: ${MAIL_PASSWORD:wkokvlcppuuaehhd}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: true  # 开启调试模式，查看详细日志
  
  # Jackson 配置
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# MyBatis 配置（如果使用）
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.cheng.mall.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: false

# 日志配置
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.cheng.mall: ${LOG_LEVEL_MALL:DEBUG}
    com.cheng.mall.repository: ${LOG_LEVEL_REPOSITORY:DEBUG}
    io.jsonwebtoken: ${LOG_LEVEL_JWT:DEBUG}
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# JWT 配置
jwt:
  secret: ThisIsAVeryLongAndSecureSecretKeyForJWTTokenGenerationWithHS512AlgorithmInGachaSystem2026
  expiration: 86400000  # 24 小时
  refresh-expiration: 604800000  # 7 天
  header: Authorization
  prefix: Bearer 

# 短信配置（阿里云）
sms:
  enabled: true
  access-key-id: your-access-key-id
  access-key-secret: your-access-key-secret
  sign-name: 游戏商城
  template-code: SMS_123456789

# OSS 配置（阿里云）
oss:
  enabled: true
  endpoint: oss-cn-hangzhou.aliyuncs.com
  access-key-id: your-access-key-id
  access-key-secret: your-access-key-secret
  bucket-name: game-mall
  base-url: https://game-mall.oss-cn-hangzhou.aliyuncs.com

# 微信支付配置
wechat:
  pay:
    app-id: your-app-id
    mch-id: your-mch-id
    api-v3-key: your-api-v3-key
    private-key-path: classpath:cert/apiclient_key.pem
    serial-no: your-serial-no
    notify-url: https://your-domain.com/api/payment/wechat/notify
    # 模拟支付模式（开发/演示环境使用）
    mock-enabled: true

# 支付宝配置
alipay:
  app-id: your-app-id
  private-key: your-private-key
  alipay-public-key: alipay-public-key
  notify-url: https://your-domain.com/api/payment/alipay/notify
  return-url: https://your-domain.com/api/payment/alipay/return

# 商城配置
mall:
  config:
    # 默认头像
    default-avatar: /images/default-avatar.png
    # 最大购物车数量
    max-cart-items: 50
    # 订单超时取消时间（分钟）
    order-timeout: 30
    # 自动确认收货时间（天）
    auto-confirm-days: 15
    # 评论审核开关
    review-audit-enabled: true
    # 图片上传大小限制（MB）
    max-upload-size: 10
