spring:
  application:
    name: mall-service

  profiles:
    active: dev

  # ========================== 本地数据库 MySQL ==========================
  datasource:
    url: jdbc:mysql://localhost:3306/gacha_system_dev?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: MallHikariCP

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

  # ========================== 本地全部关闭，不连接 ==========================
  redis:
    enabled: false
  rabbitmq:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration

  cache:
    type: simple

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  main:
    allow-bean-definition-overriding: true

mybatis:
  mapper-locations: classpath:mapper/*.xml

server:
  port: 8081
  servlet:
    context-path: /api

# ========================== JWT 配置 ==========================
jwt:
  secret: mall-service-jwt-secret-key-for-local-dev-only
  expiration: 86400000

# ========================== 微信支付配置（本地使用模拟模式） ==========================
wechat:
  pay:
    app-id: mock-app-id
    mch-id: mock-mch-id
    api-v3-key: mock-api-v3-key
    private-key-path: classpath:mock-private-key.pem
    serial-no: mock-serial-no
    notify-url: http://localhost:20222/api/pay/notify
    mock-enabled: true

logging:
  level:
    com.cheng.mall: info
    com.cheng.common: info
    org.springframework.web: info
    org.hibernate.SQL: warn