spring:
  application:
    name: mall-service

  profiles:
    active: dev

  # ========================== 本地 MySQL ==========================
  datasource:
    url: jdbc:mysql://localhost:3306/gacha_system_dev?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: MallHikariCP

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

  # ========================== 关闭 Redis ==========================
  redis:
    enabled: false

  # ========================== 关闭 RabbitMQ ==========================
  rabbitmq:
    enabled: false

  # ========================== ✅ Spring Boot 2.7 真正正确的排除 ==========================
  autoconfigure:
    exclude:
      # Redis
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      # RabbitMQ
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      # ES 3个（2.7 只需要这3个，不会报错！）
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration

  cache:
    type: simple

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  main:
    allow-bean-definition-overriding: true

mybatis:
  mapper-locations: classpath:mapper/*.xml

server:
  port: 8081
  servlet:
    context-path: /api

jwt:
  secret: mall-service-jwt-secret-key-for-local-dev-only
  expiration: 86400000

wechat:
  pay:
    app-id: mock-app-id
    mch-id: mock-mch-id
    api-v3-key: mock-api-v3-key
    private-key-path: classpath:mock-private-key.pem
    serial-no: mock-serial-no
    notify-url: http://localhost:20222/api/pay/notify
    mock-enabled: true

logging:
  config: classpath:logback-spring.xml

# Spring Boot Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,httptrace,loggers,beans