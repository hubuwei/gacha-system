spring:
  application:
    name: mall-service

  profiles:
    active: dev

  # ========================== 数据库 MySQL（支持环境变量）==========================
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gacha_system_dev}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: "${DB_PASSWORD:123456}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: MallHikariCP

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

  # ========================== Redis 和 RabbitMQ（支持本地和线上）==========================
  redis:
    enabled: ${REDIS_ENABLED:true}
    host: ${REDIS_HOST:111.228.12.167}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:Xc037417!}
    database: ${REDIS_DATABASE:0}
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1
  
  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:true}
    host: ${RABBITMQ_HOST:111.228.12.167}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:Xc037417!}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 3
        max-concurrency: 10

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration

  cache:
    type: simple

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  main:
    allow-bean-definition-overriding: true

mybatis:
  mapper-locations: classpath:mapper/*.xml

server:
  port: 8081
  servlet:
    context-path: /api

# ========================== JWT 配置 ==========================
jwt:
  secret: mall-service-jwt-secret-key-for-local-dev-only
  expiration: 86400000

# ========================== 微信支付配置（本地使用模拟模式） ==========================
wechat:
  pay:
    app-id: mock-app-id
    mch-id: mock-mch-id
    api-v3-key: mock-api-v3-key
    private-key-path: classpath:mock-private-key.pem
    serial-no: mock-serial-no
    notify-url: http://localhost:20222/api/pay/notify
    mock-enabled: true

logging:
  level:
    com.cheng.mall: info
    com.cheng.common: info
    org.springframework.web: info
    org.hibernate.SQL: warn