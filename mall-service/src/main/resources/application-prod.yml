# ============================================
# Mall Service 生产环境配置
# ============================================

server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: mall-service
  main:
    allow-bean-definition-overriding: true
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/gacha_system_prod?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
    username: root
    password: Xc037417!
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
  
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: Xc037417!
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  
  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: Xc037417!
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 5
        max-concurrency: 10
  
  # Elasticsearch 配置
  elasticsearch:
    rest:
      uris: ${ES_URIS:http://localhost:9200}
      username: ${ES_USERNAME:}
      password: ${ES_PASSWORD:}
      connection-timeout: 5s
      read-timeout: 30s

# JWT 配置
jwt:
  secret: ${JWT_SECRET:ChangeThisSecretKeyInProductionEnvironment2026}
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# 日志配置
logging:
  level:
    root: WARN
    com.cheng.mall: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  file:
    name: /opt/gacha-system/logs/mall.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 静态资源配置
static:
  resources:
    # 生产环境使用绝对路径
    game-papers-path: /opt/gacha-system/GamePapers

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
