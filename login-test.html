<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>🔐 登录功能测试</h1>
    
    <div class="form-group">
        <label for="username">用户名:</label>
        <input type="text" id="username" value="testlogin" placeholder="输入用户名">
    </div>
    
    <div class="form-group">
        <label for="password">密码:</label>
        <input type="password" id="password" value="123456" placeholder="输入密码">
    </div>
    
    <button onclick="testRegister()">注册新用户</button>
    <button onclick="testLogin()">测试登录</button>
    <button onclick="checkUsers()">查看用户列表</button>
    
    <div id="result" class="result" style="display:none;"></div>

    <script>
        const API_BASE = 'http://localhost:8084';

        function showResult(data, isSuccess = true) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result ' + (isSuccess ? 'success' : 'error');
            resultDiv.textContent = JSON.stringify(data, null, 2);
        }

        async function testRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/register/body`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        confirmPassword: password
                    })
                });
                
                const data = await response.json();
                showResult(data, data.code === 200 || data.success);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }

        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                showResult(data, data.code === 200 || data.success);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }

        async function checkUsers() {
            try {
                // 使用 game-service 的端点来查询用户（如果有的话）
                // 或者直接显示提示信息
                showResult({
                    message: '请在数据库中执行以下SQL查看用户：',
                    sql: 'SELECT id, username, password_hash FROM users ORDER BY id DESC LIMIT 10;'
                }, true);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }
    </script>
</body>
</html>
