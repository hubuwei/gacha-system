<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册功能测试（RequestParam）</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        
        h1 {
            color: #333;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info {
            background-color: #e7f3ff;
            color: #004085;
            border: 1px solid #b8daff;
        }
    </style>
</head>
<body>
    <h1>🎮 用户注册测试（RequestParam 方式）</h1>
    
    <div style="background-color: #fff3cd; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
        <strong>说明：</strong>此页面测试使用 @RequestParam 方式的注册接口
    </div>
    
    <form id="registerForm">
        <div class="form-group">
            <label for="username">用户名：</label>
            <input type="text" id="username" required placeholder="3-20 个字符，只能包含字母、数字和下划线">
        </div>
        
        <div class="form-group">
            <label for="password">密码：</label>
            <input type="password" id="password" required placeholder="6-50 个字符">
        </div>
        
        <button type="submit">注册</button>
    </form>
    
    <div id="result" class="result"></div>
    
    <div style="margin-top: 30px; text-align: center;">
        <a href="register.html" style="color: #667eea;">切换到完整版注册页面（RequestBody 方式）</a>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8081/api/auth';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            // 基本验证
            if (!username || username.length < 3 || username.length > 20) {
                showResult('用户名长度必须在 3-20 个字符之间', 'error');
                return;
            }
            
            const usernameRegex = /^[a-zA-Z0-9_]+$/;
            if (!usernameRegex.test(username)) {
                showResult('用户名只能包含字母、数字和下划线', 'error');
                return;
            }
            
            if (!password || password.length < 6 || password.length > 50) {
                showResult('密码长度必须在 6-50 个字符之间', 'error');
                return;
            }
            
            try {
                // 使用 URL 参数方式提交
                const url = `${API_BASE_URL}/register?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
                
                const response = await fetch(url, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    const userInfo = `
                        <h3>✅ 注册成功！</h3>
                        <p><strong>用户 ID:</strong> ${data.data.id}</p>
                        <p><strong>用户名:</strong> ${data.data.username}</p>
                        <p><strong>注册时间:</strong> ${new Date(data.data.createdAt).toLocaleString('zh-CN')}</p>
                        <p><strong>初始积分:</strong> ${data.data.points} 积分</p>
                        <p><strong>账户余额:</strong> ¥${data.data.balance}</p>
                    `;
                    showResult(userInfo, 'success');
                    
                    // 清空表单
                    document.getElementById('registerForm').reset();
                } else {
                    showResult(`❌ ${data.message}`, 'error');
                }
            } catch (error) {
                console.error('注册失败:', error);
                showResult('❌ 网络错误，请稍后重试', 'error');
            }
        });
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
            
            // 5 秒后自动隐藏（如果是错误信息）
            if (type === 'error') {
                setTimeout(() => {
                    resultDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
