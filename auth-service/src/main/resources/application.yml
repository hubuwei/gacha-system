spring:
  application:
    name: ${APP_NAME:auth-service}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gacha_system_dev}?useSSL=${DB_USE_SSL:false}&serverTimezone=${DB_TIMEZONE:UTC}&characterEncoding=${DB_ENCODING:utf-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: ${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
        default_storage_engine: innodb
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:111.228.12.167}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Xc037417!}
      database: ${REDIS_DATABASE:0}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:1712133303@qq.com}
    password: ${MAIL_PASSWORD:wkokvlcppuuaehhd}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# 阿里云短信配置
aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:游戏商城}
