<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前后端联调测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .status-bar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .service-status {
            display: inline-block;
            margin-right: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .service-status.online {
            background: #10b981;
            color: white;
        }
        
        .service-status.offline {
            background: #ef4444;
            color: white;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .response-area {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .response-area pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .success {
            color: #10b981;
        }
        
        .error {
            color: #ef4444;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 前后端联调测试平台</h1>
        
        <!-- 服务状态 -->
        <div class="status-bar">
            <div id="serviceStatus">
                <span class="service-status offline">检查中...</span>
            </div>
        </div>
        
        <!-- 用户信息 -->
        <div id="userInfoCard" class="user-info" style="display: none;">
            <h3>👤 当前登录用户</h3>
            <div id="userInfoContent"></div>
        </div>
        
        <div class="grid">
            <!-- 注册功能 -->
            <div class="card">
                <h2>📝 用户注册</h2>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="registerPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">注册</button>
                <div id="registerResponse" class="response-area" style="display: none;"></div>
            </div>
            
            <!-- 登录功能 -->
            <div class="card">
                <h2>🔐 用户登录</h2>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">登录</button>
                <button class="btn btn-secondary" onclick="handleLogout()">登出</button>
                <div id="loginResponse" class="response-area" style="display: none;"></div>
            </div>
            
            <!-- 充值功能 -->
            <div class="card">
                <h2>💰 账户充值</h2>
                <div class="form-group">
                    <label>充值金额</label>
                    <input type="number" id="rechargeAmount" placeholder="请输入充值金额" value="100">
                </div>
                <button class="btn btn-primary" onclick="handleRecharge()">充值</button>
                <div id="rechargeResponse" class="response-area" style="display: none;"></div>
            </div>
            
            <!-- 签到功能 -->
            <div class="card">
                <h2>📅 每日签到</h2>
                <button class="btn btn-primary" onclick="handleCheckIn()">签到</button>
                <button class="btn btn-secondary" onclick="checkCheckInStatus()">查询签到状态</button>
                <div id="checkInResponse" class="response-area" style="display: none;"></div>
            </div>
            
            <!-- 抽奖功能 -->
            <div class="card">
                <h2>🎰 幸运抽奖</h2>
                <div class="form-group">
                    <label>抽奖次数</label>
                    <select id="gachaCount">
                        <option value="1">单次抽奖</option>
                        <option value="10">十连抽</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="handleGacha()">开始抽奖</button>
                <div id="gachaResponse" class="response-area" style="display: none;"></div>
            </div>
            
            <!-- 获取用户信息 -->
            <div class="card">
                <h2>👤 用户信息</h2>
                <button class="btn btn-primary" onclick="getUserInfo()">获取信息</button>
                <div id="userInfoResponse" class="response-area" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        // API 基础地址
        const AUTH_API_BASE = 'http://localhost:8081';
        const GAME_API_BASE = 'http://localhost:8082';
        const GACHA_API_BASE = 'http://localhost:8083';
        
        // 全局变量
        let currentToken = localStorage.getItem('token') || '';
        let currentUserId = localStorage.getItem('userId') || '';
        let currentUsername = localStorage.getItem('username') || '';
        
        // 页面加载时检查服务状态
        window.onload = async function() {
            await checkServiceStatus();
            if (currentToken) {
                showUserInfo();
            }
        };
        
        // 检查服务状态
        async function checkServiceStatus() {
            const services = [
                { name: '认证服务', url: `${AUTH_API_BASE}/api/auth/info`, port: 8081 },
                { name: '游戏服务', url: `${GAME_API_BASE}/api/check-in/status?userId=1`, port: 8082 },
                { name: '抽奖服务', url: `${GACHA_API_BASE}/api/gacha/config`, port: 8083 }
            ];
            
            let statusHtml = '';
            for (const service of services) {
                try {
                    const response = await fetch(service.url, {
                        method: 'GET',
                        headers: currentToken ? { 'Authorization': `Bearer ${currentToken}` } : {}
                    });
                    if (response.ok || response.status === 401 || response.status === 404) {
                        statusHtml += `<span class="service-status online">✅ ${service.name} (${service.port})</span>`;
                    } else {
                        statusHtml += `<span class="service-status offline">❌ ${service.name} (${service.port})</span>`;
                    }
                } catch (error) {
                    statusHtml += `<span class="service-status offline">❌ ${service.name} (${service.port})</span>`;
                }
            }
            document.getElementById('serviceStatus').innerHTML = statusHtml;
        }
        
        // 显示用户信息
        function showUserInfo() {
            const userInfoCard = document.getElementById('userInfoCard');
            const userInfoContent = document.getElementById('userInfoContent');
            
            userInfoCard.style.display = 'block';
            userInfoContent.innerHTML = `
                <p><strong>用户 ID:</strong> ${currentUserId}</p>
                <p><strong>用户名:</strong> ${currentUsername}</p>
                <p><strong>Token:</strong> ${currentToken.substring(0, 50)}...</p>
            `;
        }
        
        // 处理注册
        async function handleRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!username || !password) {
                alert('请填写用户名和密码');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            const responseDiv = document.getElementById('registerResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> 注册中...';
            
            try {
                const response = await fetch(`${AUTH_API_BASE}/api/auth/register/body`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        confirmPassword: confirmPassword
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    responseDiv.innerHTML = `<div class="success"><strong>✅ 注册成功！</strong>\n\n${JSON.stringify(result.data, null, 2)}</div>`;
                } else {
                    responseDiv.innerHTML = `<div class="error"><strong>❌ 注册失败：</strong> ${result.message}</div>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error"><strong>❌ 请求失败：</strong> ${error.message}</div>`;
            }
        }
        
        // 处理登录
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                alert('请填写用户名和密码');
                return;
            }
            
            const responseDiv = document.getElementById('loginResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> 登录中...';
            
            try {
                const response = await fetch(`${AUTH_API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentToken = result.data.token;
                    currentUserId = result.data.user.id;
                    currentUsername = result.data.user.username;
                    
                    localStorage.setItem('token', currentToken);
                    localStorage.setItem('userId', currentUserId);
                    localStorage.setItem('username', currentUsername);
                    
                    responseDiv.innerHTML = `<div class="success"><strong>✅ 登录成功！</strong>

用户 ID: ${currentUserId}
用户名：${currentUsername}
Token: ${currentToken.substring(0, 50)}...</div>`;
                    
                    showUserInfo();
                } else {
                    responseDiv.innerHTML = `<div class="error"><strong>❌ 登录失败：</strong> ${result.message}</div>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error"><strong>❌ 请求失败：</strong> ${error.message}</div>`;
            }
        }
        
        // 处理登出
        function handleLogout() {
            currentToken = '';
            currentUserId = '';
            currentUsername = '';
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            
            document.getElementById('userInfoCard').style.display = 'none';
            document.getElementById('loginResponse').innerHTML = '<div class="success">✅ 已登出</div>';
            document.getElementById('loginResponse').style.display = 'block';
        }
        
        // 获取用户信息
        async function getUserInfo() {
            if (!currentToken) {
                alert('请先登录');
                return;
            }
            
            const responseDiv = document.getElementById('userInfoResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> 获取中...';
            
            try {
                const response = await fetch(`${AUTH_API_BASE}/api/auth/info`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    responseDiv.innerHTML = `<div class="success"><strong>✅ 获取成功</strong>\n\n${JSON.stringify(result.data, null, 2)}</div>`;
                } else {
                    responseDiv.innerHTML = `<div class="error"><strong>❌ 获取失败：</strong> ${result.message}</div>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error"><strong>❌ 请求失败：</strong> ${error.message}</div>`;
            }
        }
        
        // 处理充值
        async function handleRecharge() {
            if (!currentToken) {
                alert('请先登录');
                return;
            }
            
            const amount = parseFloat(document.getElementById('rechargeAmount').value);
            
            if (!amount || amount <= 0) {
                alert('请输入有效的充值金额');
                return;
            }
            
            const responseDiv = document.getElementById('rechargeResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> 充值中...';
            
            try {
                const response = await fetch(`${GAME_API_BASE}/api/recharge`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        userId: parseInt(currentUserId),
                        amount: amount,
                        rechargeMethod: 'ADMIN_DIRECT'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    responseDiv.innerHTML = `<div class="success"><strong>✅ 充值成功！</strong>\n\n${JSON.stringify(result.data, null, 2)}</div>`;
                } else {
                    responseDiv.innerHTML = `<div class="error"><strong>❌ 充值失败：</strong> ${result.message}</div>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error"><strong>❌ 请求失败：</strong> ${error.message}</div>`;
            }
        }
        
        // 处理签到
        async function handleCheckIn() {
            if (!currentToken) {
                alert('请先登录');
                return;
            }
            
            const responseDiv = document.getElementById('checkInResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> 签到中...';
            
            try {
                const response = await fetch(`${GAME_API_BASE}/api/check-in`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        userId: parseInt(currentUserId)
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    responseDiv.innerHTML = `<div class="success"><strong>✅ 签到成功！</strong>\n\n${JSON.stringify(result.data, null, 2)}</div>`;
                } else {
                    responseDiv.innerHTML = `<div class="error"><strong>❌ 签到失败：</strong> ${result.message}</div>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error"><strong>❌ 请求失败：</strong> ${error.message}</div>`;
            }
        }
        
        // 查询签到状态
        async function checkCheckInStatus() {
            if (!currentToken) {
                alert('请先登录');
                return;
            }
            
            const responseDiv = document.getElementById('checkInResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> 查询中...';
            
            try {
                const response = await fetch(`${GAME_API_BASE}/api/check-in/status?userId=${currentUserId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    responseDiv.innerHTML = `<div class="success"><strong>✅ 查询成功</strong>\n\n${JSON.stringify(result.data, null, 2)}</div>`;
                } else {
                    responseDiv.innerHTML = `<div class="error"><strong>❌ 查询失败：</strong> ${result.message}</div>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error"><strong>❌ 请求失败：</strong> ${error.message}</div>`;
            }
        }
        
        // 处理抽奖
        async function handleGacha() {
            if (!currentToken) {
                alert('请先登录');
                return;
            }
            
            const count = parseInt(document.getElementById('gachaCount').value);
            
            const responseDiv = document.getElementById('gachaResponse');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading"></div> 抽奖中...';
            
            try {
                const response = await fetch(`${GACHA_API_BASE}/api/gacha/draw`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        userId: parseInt(currentUserId),
                        count: count
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    responseDiv.innerHTML = `<div class="success"><strong>✅ 抽奖成功！</strong>\n\n${JSON.stringify(result.data, null, 2)}</div>`;
                } else {
                    responseDiv.innerHTML = `<div class="error"><strong>❌ 抽奖失败：</strong> ${result.message}</div>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error"><strong>❌ 请求失败：</strong> ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
