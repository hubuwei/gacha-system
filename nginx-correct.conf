upstream auth_service {
    server gacha-auth-service:8084;
}

upstream game_service {
    server gacha-game-service:8082;
}

upstream mall_service {
    server gacha-mall-service:8081;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 认证服务 - 使用正则表达式保持完整路径
    location ~ ^/api/auth/(.*)$ {
        proxy_pass http://auth_service/api/auth/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 游戏服务 - 使用正则表达式保持完整路径
    location ~ ^/api/game/(.*)$ {
        proxy_pass http://game_service/api/game/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 商城服务（主要API）- 使用正则表达式保持完整路径
    location ~ ^/api/(.*)$ {
        # 排除已经被上面匹配的路径
        proxy_pass http://mall_service/api/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket支持（好友系统实时通知）
    location /ws {
        proxy_pass http://mall_service/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # CMS管理系统
    location /cms {
        alias /usr/share/nginx/html/cms;
        try_files $uri $uri/ /cms/index.html;
        expires 1d;
        add_header Cache-Control "public";
    }

    # 上传文件
    location /uploads/ {
        proxy_pass http://auth_service/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源
    location /GamePapers/ {
        alias /opt/gacha-system/GamePapers/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
