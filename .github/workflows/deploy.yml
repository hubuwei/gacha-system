name: 部署Gacha系统

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        run: mvn clean package -Dmaven.test.skip=true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build game-mall frontend
        working-directory: game-mall
        run: npm install && npm run build

      - name: Build cms-admin frontend
        working-directory: cms-admin
        run: npm install && npm run build

      - name: Prepare frontend distribution
        run: |
          mkdir -p nginx-dist/admin
          cp -r game-mall/dist/* nginx-dist/
          cp -r cms-admin/dist/* nginx-dist/admin/

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            cd /opt/gacha-system
            git pull origin master

            docker compose stop auth-service game-service mall-service cms-service nginx
            docker compose rm -f auth-service game-service mall-service cms-service nginx

            docker compose build auth-service game-service mall-service cms-service
            docker compose up -d auth-service game-service mall-service cms-service nginx

            echo "✅ 后端服务已更新！"
            sleep 30

            docker compose ps

            curl -s http://localhost:8081/api/actuator/health || echo "mall-service健康检查失败"
            curl -s http://localhost:8084/api/auth/health || echo "auth-service健康检查失败"
            echo ""
            echo "✅ 部署完成！"