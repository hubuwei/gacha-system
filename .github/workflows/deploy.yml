name: 部署Steam项目

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -Pprod -Dmaven.test.skip=true

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          source: "mall-service/target/*.jar"
          target: "/opt/gacha-system/mall-service/target/"
          strip_components: 2

      - name: Restart Mall Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            cd /opt/gacha-system
            git pull
            
            # 重新构建mall-service镜像
            cd mall-service
            docker build -t gacha-system-mall-service:latest .
            
            # 重启mall-service容器
            docker rm -f gacha-mall-service || true
            docker run -d \
              --name gacha-mall-service \
              --network gacha-system_gacha-network \
              -p 8081:8081 \
              --env-file /opt/gacha-system/mall-service/.env.prod \
              -v /opt/gacha-system/GamePapers:/opt/gacha-system/GamePapers:ro \
              -v /opt/gacha-system/logs:/app/logs \
              gacha-system-mall-service:latest
            
            echo "Deployment completed successfully!"